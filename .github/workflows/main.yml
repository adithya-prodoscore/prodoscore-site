name: Deploy to Kinsta

on:
  push:
    branches:
      - main
      - staging

jobs:
  # ─────────────────────────────────────────────
  # STAGING — triggers on push to `staging` branch
  # ─────────────────────────────────────────────
  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KINSTA_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.KINSTA_STAGING_PORT }} ${{ secrets.KINSTA_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Staging
        run: |
          rsync -avzr \
            --exclude='uploads/' \
            --exclude='cache/' \
            --exclude='mu-plugins/' \
            --exclude='autoptimize/' \
            --exclude='.git' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.KINSTA_STAGING_PORT }} -o StrictHostKeyChecking=no" \
            ./wp-content/ \
            ${{ secrets.KINSTA_USER }}@${{ secrets.KINSTA_HOST }}:/www/mytestsitem_146/public/wp-content/

      - name: Post-Deployment
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.KINSTA_STAGING_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.KINSTA_STAGING_USER }}@${{ secrets.KINSTA_STAGING_HOST }} << 'EOF'
              cd /www/mytestsitem_146/public

              # Clear all caches so the new theme/plugin code is served immediately
              wp cache flush

          EOF

  # ─────────────────────────────────────────────
  # LIVE — triggers on push to `main` branch
  # ─────────────────────────────────────────────
  deploy-live:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KINSTA_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.KINSTA_PORT }} ${{ secrets.KINSTA_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Live
        run: |
          rsync -avzr \
            --exclude='uploads/' \
            --exclude='cache/' \
            --exclude='mu-plugins/' \
            --exclude='autoptimize/' \
            --exclude='.git' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.KINSTA_PORT }} -o StrictHostKeyChecking=no" \
            ./wp-content/ \
            ${{ secrets.KINSTA_USER }}@${{ secrets.KINSTA_HOST }}:/www/mytestsitem_146/public/wp-content/

      - name: Post-Deployment
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.KINSTA_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.KINSTA_USER }}@${{ secrets.KINSTA_HOST }} << 'EOF'
              cd /www/mytestsitem_146/public

              # Clear all caches so the new theme/plugin code is served immediately
              wp cache flush

          EOF
